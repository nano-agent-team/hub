name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-json:
    name: Validate JSON
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON syntax
        run: |
          error=0
          while IFS= read -r -d '' file; do
            if ! node -e "require('./$file')" 2>/dev/null; then
              echo "❌ Invalid JSON: $file"
              node -e "JSON.parse(require('fs').readFileSync('$file','utf8'))" 2>&1 | sed 's/^/   /'
              error=1
            else
              echo "✅ $file"
            fi
          done < <(find teams -name "*.json" -print0)
          exit $error

      - name: Validate team.json required fields
        run: |
          node - <<'EOF'
          const fs = require('fs');
          const path = require('path');

          const TEAM_REQUIRED = ['id', 'name', 'version', 'description', 'agents'];
          const MANIFEST_REQUIRED = ['id', 'name', 'version', 'description'];

          let errors = 0;

          function check(file, required) {
            const data = JSON.parse(fs.readFileSync(file, 'utf8'));
            for (const field of required) {
              if (data[field] === undefined || data[field] === null || data[field] === '') {
                console.error(`❌ ${file}: missing required field "${field}"`);
                errors++;
              }
            }
          }

          // Validate team.json files
          const teams = fs.readdirSync('teams');
          for (const team of teams) {
            const teamJson = path.join('teams', team, 'team.json');
            if (fs.existsSync(teamJson)) {
              check(teamJson, TEAM_REQUIRED);

              // Validate manifest.json for each agent
              const agentsDir = path.join('teams', team, 'agents');
              if (fs.existsSync(agentsDir)) {
                for (const agent of fs.readdirSync(agentsDir)) {
                  const manifestJson = path.join(agentsDir, agent, 'manifest.json');
                  if (fs.existsSync(manifestJson)) {
                    check(manifestJson, MANIFEST_REQUIRED);
                  }
                }
              }
            }
          }

          if (errors > 0) {
            console.error(`\n${errors} validation error(s) found.`);
            process.exit(1);
          } else {
            console.log('All manifests valid.');
          }
          EOF

      - name: Check required files per team
        run: |
          node - <<'EOF'
          const fs = require('fs');
          const path = require('path');

          let errors = 0;

          const teams = fs.readdirSync('teams').filter(t =>
            fs.statSync(path.join('teams', t)).isDirectory()
          );

          for (const team of teams) {
            const teamDir = path.join('teams', team);

            for (const required of ['team.json', 'setup.json']) {
              if (!fs.existsSync(path.join(teamDir, required))) {
                console.error(`❌ teams/${team}: missing ${required}`);
                errors++;
              }
            }

            const agentsDir = path.join(teamDir, 'agents');
            if (fs.existsSync(agentsDir)) {
              const agents = fs.readdirSync(agentsDir).filter(a =>
                fs.statSync(path.join(agentsDir, a)).isDirectory()
              );
              for (const agent of agents) {
                const agentDir = path.join(agentsDir, agent);
                for (const required of ['manifest.json', 'CLAUDE.md']) {
                  if (!fs.existsSync(path.join(agentDir, required))) {
                    console.error(`❌ teams/${team}/agents/${agent}: missing ${required}`);
                    errors++;
                  }
                }
              }
            }
          }

          if (errors > 0) {
            console.error(`\n${errors} structure error(s) found.`);
            process.exit(1);
          } else {
            console.log('All team structures valid.');
          }
          EOF
